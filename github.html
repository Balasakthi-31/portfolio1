<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Profile</title>

    <style>

        body{
            margin:0;
            padding:0;
            background:#0a0f2c;
            color:white;
            font-family:Arial;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .card{
            background:#11183c;
            padding:40px;
            border-radius:20px;
            text-align:center;
            box-shadow:0 0 25px rgba(0,191,255,0.5);
        }

        a{
            display:inline-block;
            margin-top:20px;
            padding:12px 30px;
            background:#00bfff;
            color:white;
            text-decoration:none;
            border-radius:30px;
        }

    </style>

</head>
<body>

    <div class="card">

        <h1>GitHub Profile</h1>

        <p>Explore my projects and repositories.</p>

        <a href="https://github.com/balasakthi-31" target="_blank">
            Visit GitHub
        </a>

    </div>

</body>
</html>
